{% include 'partials/admin_base.html' %}
{% load formato_cop %}

<div class="main-content">
    <div style="max-width:500px;margin:0 auto;">
        <div class="card-dark">
            <div class="card-dark-header" style="text-align:center;">
                <i class="fas fa-tags" style="font-size:1.5rem;margin-bottom:5px;display:block;"></i>Crear Nueva Categoría
            </div>
            <div class="card-dark-body">
                {% if messages %}
                    {% for message in messages %}
                        <div style="padding:10px;margin-bottom:20px;border-radius:4px;{% if message.tags == 'success' %}background:#1a5c1a;color:#4ade80;{% elif message.tags == 'error' %}background:#5c1a1a;color:#f87171;{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div style="margin-bottom:25px;">
                        <label class="form-label">Nombre de la Categoría</label>
                        <input type="text" name="nombre" class="form-input" placeholder="Ej: Suplementos, Ropa, Accesorios" required>
                        <small style="color:#666;">Nombre descriptivo para identificar la categoría</small>
                    </div>
                    <div style="margin-bottom:25px;">
                        <label class="form-label">Descripción (Opcional)</label>
                        <textarea name="descripcion" class="form-input" rows="3" placeholder="Descripción detallada de la categoría"></textarea>
                    </div>
                    <button type="submit" class="btn-gym" style="width:100%;justify-content:center;padding:14px;"><i class="fas fa-save"></i> Guardar Categoría</button>
                    <a href="/productos/" style="display:block;text-align:center;color:#666;margin-top:12px;text-decoration:none;padding:12px;border:1px solid #333;border-radius:8px;">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
